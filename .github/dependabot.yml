version: 2
updates:
  # GitHub Actions used in workflows under .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns: ["*"]

  # Root cargo workspace (crates/* and xtask).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  # Plugins workspace — built as wasm32-wasip2 components.
  - package-ecosystem: cargo
    directory: /plugins
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  # Fuzz workspace — pinned to nightly (rust-toolchain.toml), libfuzzer deps.
  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  # Go reference plugin (TinyGo + wit-bindgen-go).
  - package-ecosystem: gomod
    directory: /plugins/generator-go-server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      gomod-minor-patch:
        update-types: [minor, patch]

  # TypeScript reference plugin (jco + componentize-js + esbuild + tsc).
  - package-ecosystem: npm
    directory: /plugins/generator-typescript-cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
