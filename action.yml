name: 'Setup openapi-forge'
description: 'Download, verify, and cache the openapi-forge CLI.'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  version:
    description: 'Forge version to install (e.g. "0.1.11"). Default: latest release.'
    required: false
    default: 'latest'
  github-token:
    description: 'Token for GitHub API requests (avoids rate limits when resolving "latest").'
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: 'The exact version that was installed.'
    value: ${{ steps.install.outputs.version }}
  cache-hit:
    description: 'Whether the binary was found in the tool cache.'
    value: ${{ steps.install.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Install forge
      id: install
      shell: bash
      env:
        FORGE_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        repo="MarcusDunn/openapi-forge"

        # Resolve version
        if [ "$FORGE_VERSION" = "latest" ]; then
          version=$(gh api "repos/$repo/releases/latest" --jq '.tag_name | ltrimstr("v")')
        else
          version="${FORGE_VERSION#v}"
        fi
        echo "version=$version" >>"$GITHUB_OUTPUT"

        # Detect platform
        case "$RUNNER_OS" in
          Linux)
            case "$RUNNER_ARCH" in
              X64) target="x86_64-unknown-linux-gnu" ;;
              *)   echo "::error::Unsupported architecture on Linux: $RUNNER_ARCH"; exit 1 ;;
            esac ;;
          macOS)
            case "$RUNNER_ARCH" in
              ARM64) target="aarch64-apple-darwin" ;;
              *)     echo "::error::Unsupported architecture on macOS: $RUNNER_ARCH"; exit 1 ;;
            esac ;;
          *)
            echo "::error::Unsupported OS: $RUNNER_OS"
            exit 1 ;;
        esac

        # Check tool cache
        cache_dir="$RUNNER_TOOL_CACHE/forge/$version/$RUNNER_ARCH"
        if [ -x "$cache_dir/forge" ]; then
          echo "cache-hit=true" >>"$GITHUB_OUTPUT"
          echo "$cache_dir" >>"$GITHUB_PATH"
          echo "::notice::forge v${version} (cached)"
          exit 0
        fi
        echo "cache-hit=false" >>"$GITHUB_OUTPUT"

        # Download
        base_url="https://github.com/$repo/releases/download/v${version}"
        archive="forge-v${version}-${target}.tar.gz"
        checksums="forge-v${version}-SHA256SUMS"

        tmp=$(mktemp -d)
        trap 'rm -rf "$tmp"' EXIT

        echo "::group::Download forge v${version} (${target})"
        curl -fsSL --retry 3 --retry-connrefused --connect-timeout 10 \
          -o "$tmp/$archive" "$base_url/$archive"
        curl -fsSL --retry 3 --retry-connrefused --connect-timeout 10 \
          -o "$tmp/$checksums" "$base_url/$checksums"
        echo "::endgroup::"

        # Verify checksum
        echo "::group::Verify SHA-256 checksum"
        cd "$tmp"
        if command -v sha256sum >/dev/null 2>&1; then
          grep "$archive" "$checksums" | sha256sum -c -
        else
          grep "$archive" "$checksums" | shasum -a 256 -c -
        fi
        echo "::endgroup::"

        # Extract and cache
        tar xzf "$archive"
        mkdir -p "$cache_dir"
        cp "forge-v${version}-${target}/forge" "$cache_dir/forge"
        chmod 755 "$cache_dir/forge"

        echo "$cache_dir" >>"$GITHUB_PATH"
        echo "::notice::Installed forge v${version}"
